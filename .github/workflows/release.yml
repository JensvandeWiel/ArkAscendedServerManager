name: Release Desktop App (Windows NSIS)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3). Defaults to latest tag when empty.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      channel: ${{ steps.resolve.outputs.channel }}
      release_type: ${{ steps.resolve.outputs.release_type }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag, version, channel and release type
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_INPUT="${{ github.event.inputs.tag }}"
            if [[ -n "$TAG_INPUT" ]]; then
              TAG="$TAG_INPUT"
            else
              TAG="$(git describe --tags --abbrev=0)"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "::error::Unable to determine release tag"
            exit 1
          fi

          if [[ "$TAG" != v* ]]; then
            TAG="v$TAG"
          fi

          VERSION="${TAG#v}"

          if [[ "$VERSION" == *"-alpha"* ]]; then
            CHANNEL="alpha"
            RELEASE_TYPE="prerelease"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            CHANNEL="beta"
            RELEASE_TYPE="prerelease"
          else
            CHANNEL="latest"
            RELEASE_TYPE="release"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"

  build:
    needs: [release_meta]
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            arch: amd64

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_USERNAME: ${{ github.actor }}
      RELEASE_VERSION: ${{ needs.release_meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Nucleus
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main
        with:
          jbr-version: '25.0.2b329.66'
          packaging-tools: 'false'
          setup-gradle: 'true'
          setup-node: 'true'

      - name: Generate changelog and release notes
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ needs.release_meta.outputs.tag }}"
          bash ./changelog.sh "$TAG" > RELEASE_CHANGELOG.md

          cp RELEASE_CHANGELOG.md CHANGELOG.md

      - name: Build packages
        shell: bash
        run: >
          ./gradlew packageReleaseDistributionForCurrentOS
          -PreleaseChannel=${{ needs.release_meta.outputs.channel }}
          -PreleaseType=${{ needs.release_meta.outputs.release_type }}
          --stacktrace --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch }}
          path: |
            ui/build/compose/binaries/main-release/nsis/*.exe
            ui/build/compose/binaries/main-release/nsis/*.blockmap
            ui/build/compose/binaries/main-release/nsis/signing-metadata.json
            ui/build/compose/binaries/main-release/nsis/packaging-metadata.json
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ runner.os }}-${{ matrix.arch }}
          path: RELEASE_CHANGELOG.md
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: [release_meta, build]
    if: ${{ !cancelled() && needs.release_meta.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_USERNAME: ${{ github.actor }}

    steps:
      - uses: actions/checkout@v4

      - name: Regenerate and commit CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ needs.release_meta.outputs.tag }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          git fetch --tags --force
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          HEADER="## ${TAG}"
          SECTION_FILE="$(mktemp)"
          EXISTING_FILE="$(mktemp)"
          bash ./changelog.sh "$TAG" > "$SECTION_FILE"

          if [[ -f CHANGELOG.md ]]; then
            awk -v heading="$HEADER" '
              $0 == heading { skip=1; next }
              skip && /^## / { skip=0 }
              !skip { print }
            ' CHANGELOG.md > "$EXISTING_FILE"
          else
            : > "$EXISTING_FILE"
          fi

          {
            cat "$SECTION_FILE"
            if [[ -s "$EXISTING_FILE" ]]; then
              echo ""
              cat "$EXISTING_FILE"
            fi
          } > CHANGELOG.md

          if git diff --quiet -- CHANGELOG.md; then
            echo "No CHANGELOG.md changes to commit."
            exit 0
          fi

          git add CHANGELOG.md
          git commit -m "chore: update changelog for $TAG"
          git push origin "HEAD:$DEFAULT_BRANCH"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-assets-*

      - uses: actions/download-artifact@v4
        with:
          path: release-notes
          pattern: release-notes-*

      - name: Generate update YML files
        uses: kdroidFilter/Nucleus/.github/actions/generate-update-yml@main
        with:
          artifacts-path: artifacts
          version: ${{ needs.release_meta.outputs.version }}
          channel: ${{ needs.release_meta.outputs.channel }}

      - name: Publish release
        uses: kdroidFilter/Nucleus/.github/actions/publish-release@main
        with:
          artifacts-path: artifacts
          tag: ${{ needs.release_meta.outputs.tag }}
          release-type: ${{ needs.release_meta.outputs.release_type }}

      - name: Update release notes from changelog
        shell: bash
        run: |
          set -euo pipefail

          NOTES_FILE="$(find release-notes -type f -name RELEASE_CHANGELOG.md | head -n 1)"
          if [[ -z "$NOTES_FILE" ]]; then
            echo "::error::RELEASE_CHANGELOG.md artifact not found"
            exit 1
          fi

          gh release edit "${{ needs.release_meta.outputs.tag }}" --notes-file "$NOTES_FILE"

