name: Build and Release

on:
  release:
    types: [created]

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          $version = "${{ github.event.release.tag_name }}" -replace '^v', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"
        shell: powershell

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build MSI package
        run: ./gradlew :ui:packageReleaseMsi -Pversion="${{ steps.version.outputs.version }}"
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}

      - name: Find MSI file
        id: find-msi
        run: |
          $msiPath = Get-ChildItem -Path "ui/build/compose/binaries/main-release/msi" -Filter "*.msi" | Select-Object -First 1
          echo "msi-path=$($msiPath.FullName)" >> $env:GITHUB_OUTPUT
          echo "msi-name=$($msiPath.Name)" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: Upload MSI to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.find-msi.outputs.msi-path }}
          asset_name: ${{ steps.find-msi.outputs.msi-name }}
          asset_content_type: application/x-msi
